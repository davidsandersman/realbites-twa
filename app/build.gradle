plugins {
    id 'com.android.application'
}

android {
    namespace 'com.getrealbites.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.getrealbites.app'
        minSdk 21
        targetSdk 35
        versionCode 3
        versionName '1.2'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
